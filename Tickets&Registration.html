<!DOCTYPE html>
<html>
<head>
<title>Buy Festival Tickets</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:40px;
    background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('material le stunna.jpg');
    background-position: center;
    background-size: cover;
     background-repeat: no-repeat;
}

.form-container{
    width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

label{
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:none;
    background:#2e8b57;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#246b45;
}

.price{
    margin-top:10px;
    font-weight:bold;
}
/* NAVIGATION BAR */ nav { display: flex; justify-content: center; /* center links horizontally */ align-items: center; background: rgba(46, 139, 87, 0.9); /* semi-transparent green */ padding: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-radius: 10px; margin: 20px auto; max-width: 900px; } /* NAV LINKS */ nav a { color: white; text-decoration: none; font-weight: bold; font-size: 18px; margin: 0 25px; position: relative; transition: all 0.3s ease; } /* HOVER EFFECT */ nav a::after { content: ''; display: block; height: 3px; width: 0; background: #ffd700; /* gold underline on hover */ transition: width 0.3s; position: absolute; bottom: -5px; left: 0; } nav a:hover::after { width: 100%; } nav a:hover { color: #ffd700; /* text changes to gold on hover */ } /* MOBILE RESPONSIVE */ @media screen and (max-width: 600px) { nav { flex-direction: column; padding: 10px 0; } nav a { margin: 10px 0; font-size: 16px; } }
</style>

<script>
const ticketPrice = 350; // change ticket price here

function calculateTotal(){
    let qty = document.getElementById("tickets").value;
    let total = qty * ticketPrice;
    document.getElementById("totalPrice").innerHTML = "Total: M" + total;
}
</script>

</head>

<body>
       <nav>
    <a href="index.html">Home</a>
    <a href="About.html">About</a>
     <a href="schedule.html">Schedule</a>
      <a href="Tickets&Registration.html">Tickets & Registration</a>
       <a href="Contact.html">contact us</a>
    </nav>

<div class="form-container">

<h2>Buy Festival Tickets</h2>

<form>

<label>First Name</label>
<input type="text" name="firstname" required>

<label>Middle Name (Optional)</label>
<input type="text" name="middlename">

<label>Surname</label>
<input type="text" name="surname" required>

<label>ID Number</label>
<input type="text" name="idnumber" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Number of Tickets</label>
<input type="number" id="tickets" min="1" value="1" onchange="calculateTotal()">

<p class="price">Ticket Price: M350</p>
<p id="totalPrice">Total: M350</p>

<button type="submit">Buy Ticket</button>

</form>

</div>

</body>
</html>
